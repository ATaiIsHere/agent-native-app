name: my-agent-native-app
version: 0.1.0
description: One sentence description.

runtime:
  type: docker-compose
  compose_file: compose.yaml
  services:
    api:
      url: http://localhost:3001
      healthcheck: http://localhost:3001/health
    ui:
      url: http://localhost:5173
    mcp:
      transport: stdio
      command: docker compose exec -T app node dist/index.js mcp

agent:
  skill: ./SKILL.md
  ai_logic_contract: ./ai-logic-contract.yaml
  mcp_server_name: my_app
  supported_consumers:
    - hermes-agent
    - claude-code
    - codex
    - generic-mcp-client

data:
  database:
    type: sqlite
    path: ./data/app.db
  backup:
    command: ./scripts/backup.sh
    restore_command: ./scripts/restore.sh

capabilities:
  - name: read_state
    permission_level: 0
  - name: update_state
    permission_level: 2

operations:
  runbook: ./RUNBOOK.md
  install: docker compose up -d --build
  update: git pull && docker compose up -d --build
  verify: curl -f http://localhost:3001/health
