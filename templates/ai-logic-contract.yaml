ai_tasks:
  example_decision:
    description: Describe the AI decision the personal agent should perform.
    trigger: app.event_name
    permission_level: 2
    approval: optional
    read_context:
      - app_state
      - user_preferences
      - recent_history
    output_schema: ExampleDecisionResult
    writeback_tool: app_write_decision_result
    failure_handling:
      - if required context is missing, ask the user or create a proposal only
      - if writeback fails, do not retry destructively; report the error
    evals:
      - respects_user_constraints
      - produces_valid_schema
      - avoids_unapproved_destructive_actions
