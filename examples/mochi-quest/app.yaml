name: mochi-quest
version: 0.1.0
description: Personal growth quest system with goals, tasks, rewards, streaks, and assessments.

runtime:
  type: docker-compose
  compose_file: compose.yaml
  services:
    api:
      healthcheck: http://localhost:3000/health
    ui:
      url: http://localhost:3000
    mcp:
      transport: stdio
      command: docker compose exec -T mochi-quest node packages/server/dist/index.js mcp

agent:
  skill: ./SKILL.md
  ai_logic_contract: ./ai-logic-contract.yaml
  mcp_server_name: mochi_quest

capabilities:
  - name: get_dashboard
    permission_level: 0
  - name: complete_task
    permission_level: 2
  - name: generate_plan
    permission_level: 2
  - name: review_reward_pricing
    permission_level: 2
  - name: database_migration
    permission_level: 4
