ai_tasks:
  generate_plan:
    description: Generate a cycle-based plan for a clarified goal.
    trigger: goal.created | replan.pending
    permission_level: 2
    approval: optional
    read_context:
      - goal
      - user_state
      - task_history
      - lifestyle_constraints
    output_schema: CyclePlan
    writeback_tool: mq_generate_plan
    evals:
      - contains_measurable_milestones
      - daily_tasks_are_specific
      - respects_user_time_budget

  review_reward_pricing:
    description: Review whether a reward conflicts with active goals.
    trigger: reward.created
    permission_level: 2
    approval: optional
    read_context:
      - reward
      - active_goals
    output_schema: RewardImpactReview
    writeback_tool: mq_review_reward_pricing
    evals:
      - identifies_goal_conflicts
      - uses_permission_not_purchase_framing
      - avoids_moralizing

  daily_review:
    description: Review today's tasks and decide whether to notify, adjust, or stay silent.
    trigger: daily.cron
    permission_level: 1
    approval: none
    read_context:
      - today_tasks
      - recent_task_history
      - streaks
      - pending_replans
    output_schema: DailyReviewResult
    writeback_tool: none
    evals:
      - avoids_noisy_notifications
      - escalates_pending_replans
      - gives_concrete_next_action
